services:
  postgres:
    image: postgres:16-alpine
    container_name: sujin-tms-postgres
    environment:
      POSTGRES_DB: tms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Spring.2024$
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/sql/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tms"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sujin-tms-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./backend
    container_name: sujin-tms-api
    environment:
      APP_NAME: Sujin TMS API
      API_V1_PREFIX: /api/v1
      SECRET_KEY: change-this-secret-key
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      DATABASE_URL: postgresql://postgres:Spring.2024%24@postgres:5432/tms
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080","http://localhost:8091","http://127.0.0.1:3000","http://127.0.0.1:8080","http://127.0.0.1:8091"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
